<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="description" content="A beautiful containerized Progressive Web App starter template.">
    <title>the Loliva App</title>
    
    <!-- thelolivaapp Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="apple-touch-icon" href="/logo.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Shrikhand&display=swap" rel="stylesheet">
    
    <!-- Core Styles -->
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="blob-bg blob-1"></div>
    <div class="blob-bg blob-2"></div>

    <div id="login-overlay" class="login-overlay" style="display: flex;">
        <div class="neo-box login-box" style="padding: 2rem; max-width: 90vw;">
            <h2 style="font-family: var(--font-heading); margin-bottom: 2rem;">Tu quien ereh?</h2>

            <!-- Step 1: pick your character -->
            <div id="login-step-1" style="display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;">
                <button class="login-btn neo-box" data-user="al" style="display: flex; flex-direction: column; align-items: center; background: var(--bg-color); cursor: pointer; border: 3px solid #111; padding: 1rem;">
                    <img src="/gazpachino.png" alt="Al Pacino" style="height: 120px; margin-bottom: 1rem; pointer-events: none;">
                    <span style="font-family: var(--font-heading); font-size: 1.25rem; pointer-events: none; color: var(--text-primary);">Al Pacino Gazpachino</span>
                </button>
                <button class="login-btn neo-box" data-user="pep" style="display: flex; flex-direction: column; align-items: center; background: var(--accent-color); color: #fff; cursor: pointer; border: 3px solid #111; padding: 1rem;">
                    <img src="/pepinillo.png" alt="Pepinillo" style="height: 120px; margin-bottom: 1rem; pointer-events: none;">
                    <span style="font-family: var(--font-heading); font-size: 1.25rem; pointer-events: none; color: var(--bg-color);">Pepinillo Aceitunillo</span>
                </button>
            </div>

            <!-- Step 2: enter password -->
            <div id="login-step-2" style="display: none; text-align: center; margin-top: 0.5rem;">
                <p id="login-selected-label" style="font-family: var(--font-heading); font-size: 1.1rem; margin-bottom: 1rem;"></p>
                <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password"
                    style="width: 100%; padding: 0.75rem; font-family: var(--font-body); font-size: 1.1rem; border: var(--neo-border); border-radius: 8px; margin-bottom: 0.75rem; box-sizing: border-box;">
                <button id="login-confirm-btn" class="primary-btn" style="width: 100%; padding: 0.75rem; margin-bottom: 0.75rem;">Entrar</button>
                <p id="login-error" style="color: #c13a3a; display: none; margin-bottom: 0.75rem; font-family: var(--font-body);">Contraseña incorrecta</p>
                <button id="login-back-btn" style="background: none; border: none; cursor: pointer; color: var(--text-secondary); font-family: var(--font-body); font-size: 1rem;">← Volver</button>
            </div>
        </div>
    </div>

    <main class="glass-container" id="app-container" style="display: none;">
        <header>
            <div class="logo">
                <img src="/logoweb.svg" alt="App Logo" width="48" height="48" style="border-radius: 10px;">
                <h1>the Loliva App</h1>
            </div>
            <div></div>
        </header>

        <nav class="tabs-nav">
            <button class="tab-btn active" data-target="home-view">Inicio</button>
            <button class="tab-btn" data-target="map-view">Mapa</button>
            <button class="tab-btn" data-target="actividades-view">Actividades</button>
        </nav>

        <div id="home-view" class="tab-content active">
            <div id="next-activity-banner" style="display:none; margin-bottom:1.5rem;">
                <p style="font-family:var(--font-heading); font-size:0.9rem; color:var(--accent-hover); margin-bottom:0.5rem; letter-spacing:0.05em;">SIGUIENTE ACTIVIDAD</p>
                <div id="next-activity-card"></div>
            </div>

            <div id="clasificacion-feed" style="margin-bottom: 2rem;"></div>

            <div id="historico-section" class="neo-box" style="padding:1.25rem; margin-bottom:1.5rem; background:var(--card-bg);">
                <h2 class="clasificacion-title" style="margin-bottom: 1rem;">Histórico</h2>
                <div id="historico-feed">
                    Aún no hay histórico.
                </div>
            </div>
        </div>

        <div id="map-view" class="tab-content" style="display: none;">
            <div class="map-container" id="map-container">
                <div class="loading-spinner">Loading map...</div>
            </div>
            <p class="map-hint">Selecciona los paises por los que ha pasado Gazpachino y Aceitunillo!</p>
        </div>

        <div id="actividades-view" class="tab-content" style="display: none;">

            <div style="display: flex; justify-content: flex-end; margin-bottom: 1.5rem;">
                <button id="toggle-form-btn" class="add-fab" title="Nueva actividad">+</button>
            </div>

            <div id="activity-form-panel" class="neo-box activity-form-panel" style="display: none;">
                <h3 style="font-family: var(--font-heading); margin-bottom: 1rem; color: var(--accent-color);">Nueva Actividad</h3>
                <input type="text" id="activity-title" placeholder="Titulo" class="neo-input" style="width: 100%; padding: 0.75rem; margin-bottom: 1rem; font-family: var(--font-body); font-size: 1.1rem; border: var(--neo-border); border-radius: 8px;">
                <textarea id="activity-desc" placeholder="Descripcion" class="neo-input" style="width: 100%; padding: 0.75rem; margin-bottom: 1rem; font-family: var(--font-body); font-size: 1.1rem; border: var(--neo-border); border-radius: 8px; resize: vertical; min-height: 80px;"></textarea>
                <input type="number" id="activity-puntos" placeholder="Puntos" min="1" class="neo-input" style="width: 100%; padding: 0.75rem; margin-bottom: 1rem; font-family: var(--font-body); font-size: 1.1rem; border: var(--neo-border); border-radius: 8px;">
                <button id="submit-activity" class="primary-btn" style="width: 100%; padding: 0.75rem;">Nueva Actividad</button>
            </div>

            <div id="activity-feed" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Feed items rendered here via JS -->
            </div>
        </div>


        <div style="text-align: center; padding: 2rem 0 0.5rem;">
            <button id="logout-btn" style="background: none; border: none; color: var(--text-secondary); font-family: var(--font-body); font-size: 0.85rem; cursor: pointer; opacity: 0.5;">Cerrar sesión</button>
        </div>
    </main>

    <!-- Winner Picker Modal -->
    <div id="winner-modal" class="winner-modal-overlay" style="display:none;">
        <div class="winner-modal-box neo-box">
            <h3 class="winner-modal-title">¿Quién ganó?</h3>
            <p class="winner-modal-subtitle" id="winner-modal-pts"></p>
            <div style="margin-bottom: 1.25rem; text-align: left;">
                <label for="winner-date" style="font-family: var(--font-body); font-size: 0.9rem; color: var(--text-secondary); display: block; margin-bottom: 0.4rem;">Fecha completada</label>
                <input type="date" id="winner-date" class="neo-input" style="padding: 0.5rem 0.75rem; font-family: var(--font-body); font-size: 1rem; border: var(--neo-border); border-radius: 8px; width: 100%;">
            </div>
            <div style="margin-bottom: 1.25rem; text-align: left;">
                <label for="winner-extra" style="font-family: var(--font-body); font-size: 0.9rem; color: var(--text-secondary); display: block; margin-bottom: 0.4rem;">Extra (puntos adicionales)</label>
                <input type="number" id="winner-extra" min="0" placeholder="0" class="neo-input" style="padding: 0.5rem 0.75rem; font-family: var(--font-body); font-size: 1rem; border: var(--neo-border); border-radius: 8px; width: 100%;">
            </div>
            <div class="winner-modal-choices">
                <button class="winner-choice-btn" id="winner-btn-al" data-winner="al">
                    <img src="/gazpachino.png" alt="Al Pacino" class="winner-choice-avatar">
                    <span>Al Pacino</span>
                </button>
                <button class="winner-choice-btn" id="winner-btn-pep" data-winner="pep">
                    <img src="/pepinillo.png" alt="Pepinillo" class="winner-choice-avatar">
                    <span>Pepinillo</span>
                </button>
            </div>
            <button id="winner-modal-cancel" class="winner-cancel-btn">Cancelar</button>
        </div>
    </div>

    <!-- Schedule Activity Modal -->
    <div id="schedule-modal" class="winner-modal-overlay" style="display:none;">
        <div class="winner-modal-box neo-box">
            <h3 class="winner-modal-title">Programar actividad</h3>
            <p class="winner-modal-subtitle" id="schedule-modal-name"></p>
            <div style="margin-bottom: 1.25rem; text-align: left;">
                <label for="schedule-date" style="font-family: var(--font-body); font-size: 0.9rem; color: var(--text-secondary); display: block; margin-bottom: 0.4rem;">Fecha</label>
                <input type="date" id="schedule-date" class="neo-input" style="padding: 0.5rem 0.75rem; font-family: var(--font-body); font-size: 1rem; border: var(--neo-border); border-radius: 8px; width: 100%;">
            </div>
            <button id="schedule-confirm-btn" class="primary-btn" style="width: 100%; padding: 0.75rem; margin-bottom: 0.75rem; font-size: 1.25rem;">Programar</button>
            <button id="schedule-cancel-btn" class="winner-cancel-btn">Cancelar</button>
        </div>
    </div>

    <script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
